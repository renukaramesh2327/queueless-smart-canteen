name: CampusBite CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend — Syntax & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install fastapi uvicorn sqlalchemy pydantic pydantic-settings python-jose passlib python-multipart python-dotenv qrcode Pillow
      - name: Syntax check
        run: python -m py_compile app/main.py app/database/database.py app/auth/auth.py
      - name: Import check
        run: |
          DATABASE_URL=sqlite:////tmp/test.db python -c "
          import sys; sys.path.insert(0, '.')
          from app.database.database import Base, engine
          from app import models
          Base.metadata.create_all(bind=engine)
          print('✅ All models imported and tables created successfully')
          "

  frontend-check:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
